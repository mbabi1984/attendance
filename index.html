<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الحضور الجغرافي</title>
    <style>
        :root{ --green:#28a745; --green-d:#1e7e34; --red:#d64545; --amber:#c77d0a; }
        *{ box-sizing:border-box; }
        body{ font-family:Arial,"Segoe UI",sans-serif; text-align:center; padding:40px 16px; background:#f4f4f9; color:#333; margin:0; }
        .card{ background:#fff; padding:30px 24px; border-radius:14px; box-shadow:0 6px 20px rgba(0,0,0,.08); display:inline-block; width:100%; max-width:400px; }
        h2{ margin:0 0 6px; font-size:22px; }
        .sub{ color:#666; font-size:14px; margin:0 0 22px; }
        input[type="text"]{ padding:13px; width:100%; margin-bottom:16px; border:1px solid #ccc; border-radius:8px; font-size:16px; text-align:center; }
        input[type="text"]:focus{ outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(40,167,69,.15); }
        button{ background:var(--green); color:#fff; border:none; padding:14px; font-size:16px; border-radius:8px; cursor:pointer; width:100%; font-weight:bold; transition:background .15s; }
        button:hover:not(:disabled){ background:var(--green-d); }
        button:disabled{ background:#c9ccd1; cursor:not-allowed; }
        #status{ margin:20px 0 0; font-weight:bold; font-size:15px; line-height:1.7; white-space:pre-line; min-height:24px; }
    </style>
</head>
<body>

<div class="card">
    <h2>تسجيل الحضور والانصراف</h2>
    <p class="sub">يجب التواجد داخل موقع العمل لتفعيل التسجيل</p>

    <input type="text" id="empName" placeholder="أدخل اسم الموظف" autocomplete="name">
    <button id="submitBtn">تسجيل الحضور الآن</button>
    <p id="status"></p>
</div>

<script>
/* ============ الإعدادات — عدّل هنا فقط ============ */
const GAS_URL = "https://script.google.com/macros/s/AKfycbz-nMm2abO9w1DqZX9uUaXy2evZEaS27a-2VvH1jnSQAKTLZw_qsmcBmfq-ciIS4O3z/exec"; // الرابط المنتهي بـ /exec
const WORK_LAT = 24.530787226358036;   // خط عرض موقع العمل
const WORK_LNG = 46.70985721534361;   // خط طول موقع العمل
const ALLOWED_RADIUS_KM = 0.1;  // نطاق القبول (0.1 كم = 100 متر)
const MAX_ACCURACY_M    = 100;  // أسوأ دقة GPS مقبولة (متر) — يمنع القراءات غير الموثوقة
const LOG_OUT_OF_RANGE  = true; // سجّل المحاولات خارج النطاق أيضاً (مفيد للتدقيق)
/* ================================================ */

const $ = id => document.getElementById(id);
$('submitBtn').addEventListener('click', checkLocationAndSubmit);

function setStatus(msg, color){ const s=$('status'); s.innerText=msg; s.style.color=color; }

function getPosition(){
    return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject,
            { enableHighAccuracy:true, timeout:10000, maximumAge:0 });
    });
}

async function saveRecord(payload){
    // نوع "text/plain" يجعل الطلب "بسيطاً" فيتفادى حظر الـ CORS مع Apps Script
    const res = await fetch(GAS_URL, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
        redirect:'follow'
    });
    return res.json();
}

async function checkLocationAndSubmit(){
    const name = $('empName').value.trim();
    const btn  = $('submitBtn');

    if(!name){ setStatus("❌ يرجى إدخال اسم الموظف أولاً.", "var(--red)"); return; }
    if(!navigator.geolocation){ setStatus("❌ متصفحك لا يدعم تحديد الموقع الجغرافي.", "var(--red)"); return; }
    if(GAS_URL.indexOf("http") !== 0){ setStatus("⚠️ لم يتم ضبط رابط الحفظ (GAS_URL) بعد.", "var(--amber)"); return; }

    btn.disabled = true;
    setStatus("⏳ جاري تحديد موقعك والتحقق من الـ GPS...", "var(--amber)");

    try{
        const pos = await getPosition();
        const { latitude:lat, longitude:lng, accuracy } = pos.coords;

        // رفض القراءات ضعيفة الدقة (مثلاً داخل مبنى) لأنها غير موثوقة
        if(accuracy > MAX_ACCURACY_M){
            setStatus(`⚠️ دقة الـ GPS ضعيفة (±${Math.round(accuracy)} م).\nجرّب في مكان مفتوح وأعد المحاولة.`, "var(--amber)");
            btn.disabled = false; return;
        }

        const distanceM = Math.round(getDistance(lat, lng, WORK_LAT, WORK_LNG) * 1000);
        const inRange = distanceM <= ALLOWED_RADIUS_KM * 1000;

        if(!inRange && !LOG_OUT_OF_RANGE){
            setStatus(`❌ نعتذر، أنت خارج النطاق المسموح.\nتبعد حوالي ${distanceM} متر عن موقع العمل.`, "var(--red)");
            btn.disabled = false; return;
        }

        setStatus("⏳ جاري حفظ التسجيل...", "var(--amber)");
        const payload = {
            name,
            status: inRange ? "حاضر (داخل النطاق)" : "محاولة خارج النطاق",
            lat, lng, accuracy: Math.round(accuracy), distance: distanceM
        };

        let saved = false;
        try{ const r = await saveRecord(payload); saved = !!(r && r.result === "success"); }
        catch(e){ saved = false; }

        if(inRange){
            setStatus(saved
                ? `✅ تم تسجيل حضورك بنجاح.\n${name} — داخل موقع العمل.`
                : `✅ تم التحقق من موقعك، لكن تعذّر حفظ التسجيل.\nتأكد من الاتصال بالإنترنت وأعد المحاولة.`,
                saved ? "var(--green)" : "var(--amber)");
        } else {
            setStatus(`❌ أنت خارج النطاق المسموح (تبعد ${distanceM} م).\nتم تسجيل المحاولة.`, "var(--red)");
        }
    }catch(err){
        const msg = (err && err.code === 1)
            ? "❌ يجب السماح للمتصفح بالوصول إلى الموقع (GPS) لتسجيل الحضور."
            : "❌ تعذّر تحديد موقعك. تأكد من تفعيل الـ GPS وأعد المحاولة.";
        setStatus(msg, "var(--red)");
    }finally{
        btn.disabled = false;
    }
}

// معادلة هافيرسين "Haversine" — المسافة بين نقطتين على الكرة الأرضية بالكيلومتر
function getDistance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
</script>

</body>
</html>
